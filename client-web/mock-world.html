<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenBot Social Offline Mock Preview</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: Arial, sans-serif; background: #000; color: #00ffcc; }
        #canvas-container { width: 100vw; height: 100vh; }
        #mock-banner {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 10;
            background: rgba(0, 20, 40, 0.9);
            border: 2px solid #00ffcc;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }
        #mock-meta {
            position: fixed;
            top: 74px;
            left: 16px;
            z-index: 10;
            background: rgba(0, 20, 40, 0.9);
            border: 1px solid rgba(0, 255, 204, 0.6);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 220px;
        }
        #mock-meta code { color: #ffffff; }
    </style>
</head>
<body>
    <div id="mock-banner">Offline Mock Preview (No Server)</div>
    <div id="mock-meta" aria-live="polite"></div>
    <main id="canvas-container" aria-label="Offline mock world"></main>
    <script type="module" src="./mock-world.js"></script>
</body>
</html>
