name: Python SDK & Skill CI

on:
  push:
    branches: [ main, staging ]
    paths:
      - 'client-sdk-python/**'
      - 'skills/openbotclaw/**'
  pull_request:
    branches: [ main, staging ]
    paths:
      - 'client-sdk-python/**'
      - 'skills/openbotclaw/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r client-sdk-python/requirements.txt
        pip install -r skills/openbotclaw/requirements.txt

    - name: Run SDK tests
      run: python -m unittest discover -s client-sdk-python/tests -p 'test_*.py'

    - name: Run OpenBotClaw skill tests
      run: python -m unittest discover -s skills/openbotclaw/tests -p 'test_*.py'
